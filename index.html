<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MATRIARCH | Premium Selection Protocol</title>
    <meta name="description" content="The elite selection engine for high-fidelity connections." />
    <!-- Preconnect to fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Sora:wght@800&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #FFFFFF;
        margin: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }
      #root-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FFFFFF;
        z-index: 9999;
        transition: opacity 0.8s ease-in-out;
      }
      .loader-crown {
        width: 80px;
        height: 80px;
        color: #000000;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root-loader">
      <svg class="loader-crown" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"></path>
      </svg>
    </div>
    <div id="root"></div>
    <script>
      // Handshake to remove loader
      const removeLoader = () => {
        const loader = document.getElementById('root-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 800);
        }
      };

      window.addEventListener('message', (event) => {
        if (event.data === 'MATRIARCH_PROTOCOL_READY' || event.data === 'MATRIARCH_SANCTUARY_READY') {
          removeLoader();
        }
      });

      // Fail-safe: If we are in an Oauth redirect, or it's been too long, force remove loader
      if (window.location.hash.includes('access_token')) {
        console.log("MATRIARCH_BOOT: Auth redirect detected. Prioritizing protocol UI.");
        setTimeout(removeLoader, 500); 
      }
      
      setTimeout(removeLoader, 5000); 
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
