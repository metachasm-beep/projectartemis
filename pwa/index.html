<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MATRIARCH | Selection Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  </head>
  <body style="background: #0A0A0B; margin: 0; padding: 0;">
    <div id="boot-loader" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: monospace;">
      <div id="boot-text" style="color: #FF0000; font-size: 24px; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 20px; animation: pulse 1.5s infinite;">
        INIT PROTOCOL: DEEP_RECOVERY
      </div>
      <div id="diagnostic-console" style="color: #00FF00; font-size: 12px; max-width: 80%; text-align: left; background: rgba(0,255,0,0.05); padding: 15px; border-left: 2px solid #00FF00; display: none;">
        [DIAGNOSTIC ACTIVE]
      </div>
      <button onclick="document.getElementById('boot-loader').style.display='none'" style="margin-top: 20px; background: transparent; border: 1px solid #FF0000; color: #FF0000; padding: 5px 10px; cursor: pointer; font-size: 10px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase;">Forced Handshake Bypass</button>
      <style>
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
      </style>
      <script>
        window.__BUNDLE_START__ = false;
        window.onerror = function(msg, url, line, col) {
          var console = document.getElementById('diagnostic-console');
          if (console) {
            console.style.display = "block";
            console.innerHTML += "<div style='color: #FF0000'>> ERROR: " + msg + "</div><div>> AT: " + url + ":" + line + ":" + col + "</div>";
          }
          return false;
        };
        setTimeout(function() {
          if (!window.__BUNDLE_START__) {
            var console = document.getElementById('diagnostic-console');
            if (console) {
              console.style.display = "block";
              console.innerHTML += "<div style='color: #FF9900'>> WARNING: Main bundle failed to execute after 3s. Check network/CSP.</div>";
            }
          }
        }, 3000);
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
