<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MATRIARCH | Deep Recovery v1.0.2</title>
    
    <!-- Immediate Service Worker Termination -->
    <script>
      console.log("RECOVERY_MODE: Killing Service Workers...");
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log("RECOVERY_MODE: Unregistered SW", registration);
          }
        }).catch(function(err) {
          console.error('RECOVERY_MODE: SW Unregister failed: ', err);
        });
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  </head>
  <body style="background: #0A0A0B; margin: 0; padding: 0;">
    <!-- Background is now Dark Cyan/Blue to distinguish from "Black Screen" -->
    <div id="boot-loader" style="position: fixed; inset: 0; background: #001219; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: monospace; transition: opacity 0.5s ease;">
      <div style="border: 1px solid #00F2FF; padding: 40px; background: rgba(0,242,255,0.02); display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,242,255,0.1);">
        <div id="boot-text" style="color: #00F2FF; font-size: 24px; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 5px; animation: pulse 1.5s infinite;">
          MATRIARCH_PROTOCOL
        </div>
        <div style="color: #00F2FF; font-size: 10px; opacity: 0.6; margin-bottom: 30px;">DEEP_RECOVERY_MODE_v1.0.2</div>
        
        <div id="diagnostic-console" style="color: #00FF00; font-size: 11px; width: 400px; text-align: left; background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid rgba(0,255,0,0.3); max-height: 200px; overflow-y: auto; margin-bottom: 20px;">
          <div style="color: #00F2FF">> [SYSTEM] DIAGNOSTIC_NODE_ONLINE_v1.0.2</div>
        </div>

        <button id="bypass-btn" onclick="document.getElementById('boot-loader').style.display='none'" style="background: rgba(255,0,0,0.1); border: 1px solid #FF0000; color: #FF0000; padding: 10px 20px; cursor: pointer; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.3s;">
          Forced Protocol Bypass
        </button>
      </div>

      <style>
        @keyframes pulse { 0% { opacity: 0.5; text-shadow: 0 0 10px rgba(0,242,255,0); } 50% { opacity: 1; text-shadow: 0 0 20px rgba(0,242,255,0.5); } 100% { opacity: 0.5; text-shadow: 0 0 10px rgba(0,242,255,0); } }
        #bypass-btn:hover { background: #FF0000; color: #FFF; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
      </style>

      <script>
        window.__BUNDLE_START__ = false;
        var diag = document.getElementById('diagnostic-console');
        
        window.onerror = function(msg, url, line, col) {
          if (diag) {
            diag.innerHTML += "<div style='color: #FF0000; margin-top: 5px;'>> FATAL_ERROR: " + msg + "</div><div style='opacity: 0.5'>> AT: " + url.split('/').pop() + ":" + line + "</div>";
          }
          return false;
        };

        setTimeout(function() {
          if (!window.__BUNDLE_START__) {
            if (diag) {
              diag.innerHTML += "<div style='color: #FF9900; margin-top: 10px;'>> TIMEOUT: Main entry bundle missing or blocked.</div>";
              diag.innerHTML += "<div style='color: #FF9900'>> SUGGESTION: Check browser console (F12) for CSP violations.</div>";
            }
          }
        }, 5000);
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
