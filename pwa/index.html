<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MATRIARCH | Selection Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  </head>
  <body style="background: #0A0A0B; margin: 0; padding: 0;">
    <!-- Emergency Boot Visibility Check -->
    <div id="boot-loader" style="height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0A0A0B; color: #D4AF37; font-family: sans-serif; position: fixed; inset: 0; z-index: 9999;">
      <div style="font-size: 14px; letter-spacing: 0.5em; font-weight: 900; opacity: 0.8;">INIT PROTOCOL...</div>
      <div id="boot-error-box" style="display: none; max-width: 80%; margin-top: 40px; padding: 20px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; font-size: 10px; font-family: monospace; white-space: pre-wrap; word-break: break-all;"></div>
    </div>

    <!-- Error Spy Script -->
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var box = document.getElementById('boot-error-box');
        if (box) {
          box.style.display = 'block';
          box.innerText = "Fatal Protocol Failure:\n" + msg + "\nAt: " + url + ":" + line + ":" + col;
        }
        return false;
      };
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
